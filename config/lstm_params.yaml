# LSTM模型超参数配置
model:
  input_dim: null  # 由数据自动推断
  hidden_dim: 128
  num_layers: 2
  dropout: 0.2
  output_dim: 2

data:
  seq_len: 32
  stride: 16
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15

training:
  batch_size: 64
  epochs: 100
  learning_rate: 0.001
  weight_decay: 0.00001
  patience: 5
  gradient_clip: 1.0

seed: 42
